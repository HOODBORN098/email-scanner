<!DOCTYPE html>
<html class="light" lang="en">
<head>
    <meta charset="utf-8"/>
    <meta content="width=device-width, initial-scale=1.0" name="viewport"/>
    <title>Clinical Sentinel | Forgot Password</title>
    <script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&amp;display=swap" rel="stylesheet"/>
    <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
    <script id="tailwind-config">
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    colors: {
                        "primary": "#003d9b",
                        "on-primary": "#ffffff",
                        "surface": "#f0f4f9",
                        "on-surface": "#181c20",
                        "on-surface-variant": "#434654",
                        "outline-variant": "#c3c6d6"
                    }
                }
            }
        }
    </script>
    <style>
        body { font-family: 'Inter', sans-serif; }
    </style>
</head>
<body class="bg-surface text-on-surface w-full h-screen flex items-center justify-center p-6">
    <div class="w-full max-w-sm">
        <div class="mb-10 text-center">
            <div class="inline-flex w-16 h-16 rounded-3xl bg-primary flex items-center justify-center text-white shadow-xl shadow-primary/20 mb-8">
    <span class="material-symbols-outlined text-3xl">lock_open</span>
</div>
            <h2 class="text-3xl font-black tracking-tighter text-on-surface mb-2">Reset Password</h2>
            <p class="text-on-surface-variant text-sm font-medium">Enter your email and we'll send a recovery link.</p>
        </div>

        <form id="forgot-password-form" class="space-y-6">
            <div>
                <label for="email" class="block text-xs font-bold text-on-surface-variant uppercase tracking-widest mb-2"><span data-i18n="sup_label_email">Secure Email</span></label>
                <div class="relative group">
                    <span class="absolute inset-y-0 left-0 flex items-center pl-4">
                            <span class="material-symbols-outlined text-outline">alternate_email</span>
                        </span>
                    <input type="email" id="email" required placeholder="you@clinical.secure" class="w-full bg-slate-50 border-2 border-slate-300 focus:border-primary transition-all py-4 pl-12 pr-4 rounded-2xl text-sm font-medium text-on-surface outline-none shadow-md">
                </div>
            </div>

            <button type="submit" class="w-full bg-primary text-white py-4 rounded-2xl font-black tracking-tight hover:shadow-lg hover:shadow-primary/20 transition-all active:scale-[0.98]">
                Send Recovery Link
            </button>
        </form>

        <div class="mt-8 text-center">
    <a href="login.html" class="inline-flex items-center gap-2 text-xs font-black text-primary uppercase tracking-[0.2em] hover:underline">
        <span class="material-symbols-outlined text-sm">arrow_back</span>
        Back to Sign in
    </a>
</div>
    </div>

    <script>
        document.getElementById('forgot-password-form').addEventListener('submit', function(e) {
            e.preventDefault();
            const btn = e.target.querySelector('button');
            const originalText = btn.innerText;
            
            btn.innerText = 'Transmitting link...';
            btn.disabled = true;
            btn.classList.add('opacity-50', 'cursor-not-allowed');

            setTimeout(() => {
                alert('If an account exists for this email, a recovery link has been transmitted.');
                window.location.href = 'login.html';
            }, 1500);
        });
    </script>
<script src="i18n.js"></script>

<div class="hidden lg:flex fixed top-6 right-8 z-[100] items-center p-1 bg-slate-50/80 backdrop-blur-md rounded-full border border-slate-300 shadow-xl">
    <button onclick="updateLanguage('en')" data-lang="en" class="lang-toggle-btn px-4 py-1.5 rounded-full text-[11px] font-black tracking-widest transition-all">EN</button>
    <button onclick="updateLanguage('es')" data-lang="es" class="lang-toggle-btn px-4 py-1.5 rounded-full text-[11px] font-black tracking-widest transition-all">ES</button>
</div>

</body>
</html>
